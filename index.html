<!DOCTYPE html>
<html lang="nl">
<head>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --bg2: #0d0f1a;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaf0;
      --text-dim: rgba(232,234,240,0.4);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      --c-linkai: #4f9cf9;
      --c-chb: #f59e0b;
      --c-tvm: #10b981;
      --c-tbf: #f97316;
      --c-afni: #a78bfa;
      --c-syifa: #f472b6;
      --c-persoonlijk: #22d3ee;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    #sidebar {
      width: 200px;
      min-width: 200px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 6px;
      z-index: 10;
    }

    #sidebar h1 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar h1 span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      font-family: var(--font-body);
      margin-top: 4px;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .cat-btn:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .cat-btn.active {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border-color: var(--border);
    }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cat-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 10px;
    }

    #sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #what-next-btn {
      padding: 10px 14px;
      background: linear-gradient(135deg, #4f9cf9, #a78bfa);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #what-next-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    #what-next-btn:active { transform: translateY(0); }

    #add-btn {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #add-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.04); }

    #task-total {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    /* MAIN CHART */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    /* Nodes */
    .bubble-group { cursor: pointer; }

    .bubble-group circle.bg {
      transition: filter 0.3s;
    }

    .bubble-group:hover circle.bg {
      filter: brightness(1.25);
    }

    .bubble-group text {
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: white;
      font-family: var(--font-body);
      font-weight: 500;
      line-height: 1.3;
    }

    /* TOOLTIP */
    #tooltip {
      position: fixed;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      max-width: 240px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    #tooltip.visible { opacity: 1; }

    #tooltip .t-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    #tooltip .t-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    #tooltip .t-row span:last-child {
      color: var(--text);
      font-weight: 500;
    }

    #tooltip .t-cat {
      display: inline-block;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #tooltip .t-action {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* MODAL */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 440px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    #modal h2 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .form-row {
      margin-bottom: 16px;
    }

    .form-row label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .form-row input, .form-row select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input:focus, .form-row select:focus {
      border-color: rgba(79,156,249,0.5);
    }

    .form-row select option { background: #1a1c2e; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      border: none;
      padding: 0;
    }

    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4f9cf9;
      cursor: pointer;
    }

    .slider-val {
      width: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #modal-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    #modal-cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    #modal-save {
      background: linear-gradient(135deg, #4f9cf9, #a78bfa);
      border: none;
      color: white;
    }
    #modal-save:hover { opacity: 0.85; }

    /* HIGHLIGHT RING for "what next" */
    .bubble-group.highlight circle.ring {
      display: block;
    }
    .bubble-group circle.ring {
      display: none;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-dasharray: 6 4;
      animation: spin 6s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* DONE EXPLOSION */
    @keyframes explode-out {
      0% { transform: scale(1); opacity: 1; }
      60% { transform: scale(1.6); opacity: 0.5; }
      100% { transform: scale(0); opacity: 0; }
    }
    .bubble-group.completing {
      animation: explode-out 0.5s ease-out forwards;
    }

    /* Stars background */
    #stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #score-legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    #score-legend .dot-sm { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    #score-legend .dot-lg { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  </style>
</head>

let nextId = Math.max(...tasks.map(t => t.id)) + 1;

function saveTasks() {
  localStorage.setItem('todo-bubbles', JSON.stringify(tasks));
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function scoreTask(t) {
  const base = (t.priority * t.impact) / t.effort;
  let urgencyBoost = 1;
  if (t.deadline) {
    const days = (new Date(t.deadline) - new Date()) / 86400000;
    if (days <= 0) urgencyBoost = 3;
    else if (days <= 2) urgencyBoost = 2.5;
    else if (days <= 7) urgencyBoost = 1.8;
    else if (days <= 14) urgencyBoost = 1.3;
  }
  return base * urgencyBoost;
}

function radiusFromScore(score) {
  return Math.max(28, Math.min(75, 20 + score * 5));
}

// ── CHART ─────────────────────────────────────────────────────────────────────
let simulation, svg, g, node;
let currentFilter = 'all';
let highlightId = null;

const tooltip = document.getElementById('tooltip');

function getFilteredTasks() {
  if (currentFilter === 'all') return tasks;
  return tasks.filter(t => t.category === currentFilter);
}

function initChart() {
  svg = d3.select('#chart');
  g = svg.append('g').attr('class', 'bubbles');

  // Subtle stars background
  const starsG = svg.append('g').attr('class', 'stars').lower();
  for (let i = 0; i < 120; i++) {
    const w = window.innerWidth, h = window.innerHeight;
    const sz = Math.random() * 1.5;
    starsG.append('circle')
      .attr('cx', Math.random() * w)
      .attr('cy', Math.random() * h)
      .attr('r', sz)
      .attr('fill', `rgba(255,255,255,${Math.random() * 0.4 + 0.1})`);
  }

  simulation = d3.forceSimulation()
    .force('charge', d3.forceManyBody().strength(d => -radiusFromScore(scoreTask(d)) * 2.5))
    .force('collide', d3.forceCollide().radius(d => radiusFromScore(scoreTask(d)) + 6))
    .force('x', d3.forceX(window.innerWidth / 2).strength(d => {
      const s = scoreTask(d);
      return 0.04 + s * 0.006;
    }))
    .force('y', d3.forceY(window.innerHeight / 2).strength(d => {
      const s = scoreTask(d);
      return 0.04 + s * 0.006;
    }))
    .alphaDecay(0.02)
    .velocityDecay(0.4);

  renderBubbles();
  updateCounts();
}

function renderBubbles() {
  const data = getFilteredTasks().map(t => {
    const existing = node ? node.data().find(d => d.id === t.id) : null;
    return existing ? { ...t, x: existing.x, y: existing.y, vx: existing.vx, vy: existing.vy } : {
      ...t,
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2 + (Math.random() - 0.5) * 200,
    };
  });

  const allNodes = g.selectAll('.bubble-group').data(data, d => d.id);

  // ENTER
  const enter = allNodes.enter()
    .append('g')
    .attr('class', d => `bubble-group${d.id === highlightId ? ' highlight' : ''}`)
    .style('opacity', 0)
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    )
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', completeTask);

  enter.append('circle')
    .attr('class', 'glow-outer')
    .attr('r', d => radiusFromScore(scoreTask(d)) + 12)
    .attr('fill', d => CATS[d.category] + '18');

  enter.append('circle')
    .attr('class', 'bg')
    .attr('r', d => radiusFromScore(scoreTask(d)))
    .attr('fill', d => {
      const c = CATS[d.category];
      const id = `grad-${d.id}`;
      const defs = svg.select('defs').empty() ? svg.append('defs') : svg.select('defs');
      const grad = defs.append('radialGradient')
        .attr('id', id)
        .attr('cx', '35%').attr('cy', '35%');
      grad.append('stop').attr('offset', '0%').attr('stop-color', lighten(c, 40));
      grad.append('stop').attr('offset', '100%').attr('stop-color', c);
      return `url(#${id})`;
    });

  // Dashed ring for "what next" highlight
  enter.append('circle')
    .attr('class', 'ring')
    .attr('r', d => radiusFromScore(scoreTask(d)) + 8);

  enter.each(function(d) {
    const r = radiusFromScore(scoreTask(d));
    const label = truncate(d.title, r < 35 ? 10 : r < 50 ? 18 : 28);
    const lines = wrapText(label, r);
    const g = d3.select(this);
    const lineH = 14;
    const totalH = lines.length * lineH;
    lines.forEach((line, i) => {
      g.append('text')
        .attr('dy', -totalH/2 + i * lineH + lineH/2)
        .attr('font-size', r < 35 ? '9px' : r < 50 ? '11px' : '12px')
        .text(line);
    });
  });

  enter.transition().duration(600).ease(d3.easeBackOut).style('opacity', 1);

  // EXIT
  allNodes.exit()
    .transition().duration(400)
    .style('opacity', 0)
    .attr('transform', d => `translate(${d.x},${d.y}) scale(0)`)
    .remove();

  // UPDATE highlight
  g.selectAll('.bubble-group')
    .classed('highlight', d => d.id === highlightId);

  node = g.selectAll('.bubble-group');

  simulation.nodes(data);
  simulation.on('tick', () => {
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
  simulation.alpha(0.4).restart();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function completeTask(event, d) {
  event.stopPropagation();
  hideTooltip();

  d3.select(this).classed('completing', true);

  setTimeout(() => {
    tasks = tasks.filter(t => t.id !== d.id);
    if (highlightId === d.id) highlightId = null;
    saveTasks();
    renderBubbles();
    updateCounts();
  }, 450);
}

function showTooltip(event, d) {
  const score = scoreTask(d).toFixed(1);
  document.getElementById('t-title').textContent = d.title;
  document.getElementById('t-pri').textContent = '⭐'.repeat(d.priority);
  document.getElementById('t-impact').textContent = '💥'.repeat(d.impact);
  document.getElementById('t-effort').textContent = '⚡'.repeat(d.effort);
  document.getElementById('t-score').textContent = score;
  const cat = document.getElementById('t-cat');
  cat.textContent = d.category;
  cat.style.background = CATS[d.category] + '30';
  cat.style.color = CATS[d.category];

  const dlRow = document.getElementById('t-deadline-row');
  if (d.deadline) {
    dlRow.style.display = 'flex';
    const days = Math.ceil((new Date(d.deadline) - new Date()) / 86400000);
    document.getElementById('t-deadline').textContent =
      days <= 0 ? '🔴 Vandaag!' : days === 1 ? '🟠 Morgen' : `${days} dagen`;
  } else {
    dlRow.style.display = 'none';
  }

  tooltip.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.clientX + 14;
  const y = event.clientY - 10;
  tooltip.style.left = Math.min(x, window.innerWidth - 260) + 'px';
  tooltip.style.top = Math.min(y, window.innerHeight - 200) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

function filterCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = cat;
  renderBubbles();
}

function whatNext() {
  const visible = getFilteredTasks();
  if (!visible.length) return;
  const best = visible.reduce((a, b) => scoreTask(a) > scoreTask(b) ? a : b);
  highlightId = best.id;
  renderBubbles();

  // show tooltip for best task
  setTimeout(() => {
    const el = g.selectAll('.bubble-group').filter(d => d.id === best.id);
    if (!el.empty()) {
      const d = el.datum();
      tooltip.classList.add('visible');
      document.getElementById('t-title').textContent = '⚡ ' + d.title;
      document.getElementById('t-pri').textContent = '⭐'.repeat(d.priority);
      document.getElementById('t-impact').textContent = '💥'.repeat(d.impact);
      document.getElementById('t-effort').textContent = '⚡'.repeat(d.effort);
      document.getElementById('t-score').textContent = scoreTask(d).toFixed(1);
      const cat = document.getElementById('t-cat');
      cat.textContent = d.category;
      cat.style.background = CATS[d.category] + '30';
      cat.style.color = CATS[d.category];
      document.getElementById('t-deadline-row').style.display = 'none';
      tooltip.style.left = (window.innerWidth / 2 - 60) + 'px';
      tooltip.style.top = '80px';
    }
  }, 300);
}

function updateCounts() {
  const total = tasks.length;
  document.getElementById('count-all').textContent = total;
  document.getElementById('task-total').textContent = `${total} taken open`;
  Object.keys(CATS).forEach(cat => {
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = tasks.filter(t => t.category === cat).length;
  });
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }

  const task = {
    id: nextId++,
    title,
    category: document.getElementById('f-cat').value,
    priority: +document.getElementById('f-pri').value,
    impact: +document.getElementById('f-impact').value,
    effort: +document.getElementById('f-effort').value,
    deadline: document.getElementById('f-deadline').value || null,
  };

  tasks.push(task);
  saveTasks();
  closeModal();
  document.getElementById('f-title').value = '';
  document.getElementById('f-pri').value = 3; document.getElementById('v-pri').textContent = '3';
  document.getElementById('f-impact').value = 3; document.getElementById('v-impact').textContent = '3';
  document.getElementById('f-effort').value = 2; document.getElementById('v-effort').textContent = '2';
  document.getElementById('f-deadline').value = '';

  renderBubbles();
  updateCounts();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveTask();
});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function lighten(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
}

function truncate(str, len) {
  return str.length <= len ? str : str.slice(0, len - 1) + '…';
}

function wrapText(text, r) {
  const charsPerLine = Math.floor(r / 3.5);
  if (text.length <= charsPerLine) return [text];
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const w of words) {
    if ((current + ' ' + w).trim().length <= charsPerLine) {
      current = (current + ' ' + w).trim();
    } else {
      if (current) lines.push(current);
      current = w;
    }
  }
  if (current) lines.push(current);
  return lines.slice(0, 3);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  simulation.force('x', d3.forceX(window.innerWidth / 2).strength(d => 0.04 + scoreTask(d) * 0.006));
  simulation.force('y', d3.forceY(window.innerHeight / 2).strength(d => 0.04 + scoreTask(d) * 0.006));
  simulation.alpha(0.2).restart();
});

initChart();
</script>
