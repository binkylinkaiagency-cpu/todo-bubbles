<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToodooTool — Link AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --bg2: #0d0f1a;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaf0;
      --text-dim: rgba(232,234,240,0.4);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      --c-linkai: #4f9cf9;
      --c-chb: #f59e0b;
      --c-tvm: #10b981;
      --c-tbf: #f97316;
      --c-afni: #a78bfa;
      --c-syifa: #f472b6;
      --c-persoonlijk: #22d3ee;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    #sidebar {
      width: 200px;
      min-width: 200px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 6px;
      z-index: 10;
    }

    #sidebar h1 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar h1 span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      font-family: var(--font-body);
      margin-top: 4px;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .cat-btn:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .cat-btn.active {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border-color: var(--border);
    }

    .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cat-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 10px;
    }

    #sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #what-next-btn {
      padding: 10px 14px;
      background: linear-gradient(135deg, #4f9cf9, #a78bfa);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #what-next-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    #what-next-btn:active { transform: translateY(0); }

    #add-btn {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #add-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.04); }

    #task-total {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    /* MAIN CHART */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    /* Nodes */
    .bubble-group { cursor: pointer; }

    .bubble-group circle.bg {
      transition: filter 0.3s;
    }

    .bubble-group:hover circle.bg {
      filter: brightness(1.3) saturate(1.2);
    }

    .bubble-group text {
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: white;
      font-family: var(--font-body);
      font-weight: 700;
      line-height: 1.3;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.7);
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    /* Gamify score bar */
    #gamify-bar {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 4px;
    }
    #gamify-bar .g-level {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }
    #gamify-bar .g-level span { color: #f59e0b; }
    #gamify-bar .g-xp-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #gamify-bar .g-xp-fill {
      height: 100%;
      background: linear-gradient(90deg, #4f9cf9, #f59e0b);
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #gamify-bar .g-xp-text {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* Points popup */
    .points-popup {
      position: fixed;
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      color: #f59e0b;
      pointer-events: none;
      z-index: 300;
      text-shadow: 0 0 20px rgba(245,158,11,0.8);
      animation: points-fly 1.2s ease-out forwards;
    }
    @keyframes points-fly {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-60px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
    }

    /* TOOLTIP */
    #tooltip {
      position: fixed;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      max-width: 240px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    #tooltip.visible { opacity: 1; }

    #tooltip .t-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    #tooltip .t-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    #tooltip .t-row span:last-child {
      color: var(--text);
      font-weight: 500;
    }

    #tooltip .t-cat {
      display: inline-block;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #tooltip .t-action {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
    }
    #tooltip .t-action button {
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    #tooltip .t-action button:hover { background: #16a34a; }
    #tooltip.pinned { pointer-events: all; }
    #t-breakdown-btn { background:#7c3aed; color:#fff; border:none; border-radius:6px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; }
    #t-breakdown-btn:hover { background:#6d28d9; }
    #t-breakdown-btn:disabled { background:#4a3070; color:#aaa; cursor:not-allowed; }
    #t-subtasks-list .sub-item { display:flex; align-items:center; gap:6px; font-size:11px; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    #t-subtasks-list .sub-item input[type=checkbox] { accent-color:#22c55e; cursor:pointer; }
    #t-subtasks-list .sub-item.done span { text-decoration:line-through; opacity:0.5; }

    /* MODAL */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 440px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    #modal h2 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .form-row {
      margin-bottom: 16px;
    }

    .form-row label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .form-row input, .form-row select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input:focus, .form-row select:focus {
      border-color: rgba(79,156,249,0.5);
    }

    .form-row select option { background: #1a1c2e; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      border: none;
      padding: 0;
    }

    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4f9cf9;
      cursor: pointer;
    }

    .slider-val {
      width: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #modal-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    #modal-cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    #modal-save {
      background: linear-gradient(135deg, #4f9cf9, #a78bfa);
      border: none;
      color: white;
    }
    #modal-save:hover { opacity: 0.85; }

    /* HIGHLIGHT RING for "what next" */
    .bubble-group.highlight circle.ring {
      display: block;
    }
    .bubble-group circle.ring {
      display: none;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-dasharray: 6 4;
      animation: spin 6s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* DONE EXPLOSION */
    @keyframes explode-out {
      0% { transform: scale(1); opacity: 1; }
      60% { transform: scale(1.6); opacity: 0.5; }
      100% { transform: scale(0); opacity: 0; }
    }
    .bubble-group.completing {
      animation: explode-out 0.5s ease-out forwards;
    }

    /* Stars background */
    #stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #zoom-controls {
      position: absolute;
      bottom: 56px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }

    #zoom-controls button {
      width: 34px;
      height: 34px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
    }
    #zoom-controls button:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    #score-legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    #score-legend .dot-sm { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    #score-legend .dot-lg { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <h1>ToodooTool<span>Link AI Agency</span></h1>

    <button class="cat-btn active" data-cat="all" onclick="filterCat(this, 'all')">
      <span class="cat-dot" style="background:#ffffff40"></span>
      Alles
      <span class="cat-count" id="count-all">0</span>
    </button>

    <button class="cat-btn" data-cat="LinkAI" onclick="filterCat(this, 'LinkAI')">
      <span class="cat-dot" style="background:var(--c-linkai)"></span>
      Link AI
      <span class="cat-count" id="count-LinkAI">0</span>
    </button>

    <button class="cat-btn" data-cat="CHB" onclick="filterCat(this, 'CHB')">
      <span class="cat-dot" style="background:var(--c-chb)"></span>
      CHB
      <span class="cat-count" id="count-CHB">0</span>
    </button>

    <button class="cat-btn" data-cat="TVM" onclick="filterCat(this, 'TVM')">
      <span class="cat-dot" style="background:var(--c-tvm)"></span>
      TVM
      <span class="cat-count" id="count-TVM">0</span>
    </button>

    <button class="cat-btn" data-cat="TBF" onclick="filterCat(this, 'TBF')">
      <span class="cat-dot" style="background:var(--c-tbf)"></span>
      TBF
      <span class="cat-count" id="count-TBF">0</span>
    </button>

    <button class="cat-btn" data-cat="AFNI" onclick="filterCat(this, 'AFNI')">
      <span class="cat-dot" style="background:var(--c-afni)"></span>
      AFNI
      <span class="cat-count" id="count-AFNI">0</span>
    </button>

    <button class="cat-btn" data-cat="Syifa" onclick="filterCat(this, 'Syifa')">
      <span class="cat-dot" style="background:var(--c-syifa)"></span>
      Syifa
      <span class="cat-count" id="count-Syifa">0</span>
    </button>

    <button class="cat-btn" data-cat="Persoonlijk" onclick="filterCat(this, 'Persoonlijk')">
      <span class="cat-dot" style="background:var(--c-persoonlijk)"></span>
      Persoonlijk
      <span class="cat-count" id="count-Persoonlijk">0</span>
    </button>

    <div style="margin: 10px 0 4px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); padding: 0 4px;">Urgentie</div>

    <button class="cat-btn" data-urg="🔴⚡ SUPERPRIO" onclick="filterUrg(this, '🔴⚡ SUPERPRIO')">
      <span class="cat-dot" style="background:#ff2d2d"></span>
      SUPERPRIO
      <span class="cat-count" id="count-urg-super">0</span>
    </button>
    <button class="cat-btn" data-urg="🔴 Kritiek" onclick="filterUrg(this, '🔴 Kritiek')">
      <span class="cat-dot" style="background:#f87171"></span>
      Kritiek
      <span class="cat-count" id="count-urg-kritiek">0</span>
    </button>
    <button class="cat-btn" data-urg="🟠 Hoog" onclick="filterUrg(this, '🟠 Hoog')">
      <span class="cat-dot" style="background:#f97316"></span>
      Hoog
      <span class="cat-count" id="count-urg-hoog">0</span>
    </button>
    <button class="cat-btn" data-urg="🟡 Matig" onclick="filterUrg(this, '🟡 Matig')">
      <span class="cat-dot" style="background:#eab308"></span>
      Matig
      <span class="cat-count" id="count-urg-matig">0</span>
    </button>
    <button class="cat-btn" data-urg="🟢 Laag" onclick="filterUrg(this, '🟢 Laag')">
      <span class="cat-dot" style="background:#22c55e"></span>
      Laag
      <span class="cat-count" id="count-urg-laag">0</span>
    </button>

    <div id="sidebar-bottom">
      <div id="gamify-bar">
        <div class="g-level">Level <span id="g-level-num">1</span> — <span id="g-level-name">Starter</span></div>
        <div class="g-xp-bar"><div class="g-xp-fill" id="g-xp-fill" style="width:0%"></div></div>
        <div class="g-xp-text"><span id="g-xp">0</span> XP — <span id="g-completed">0</span> taken gedaan</div>
        <div class="g-streak" id="g-streak-bar" style="margin-top:6px; font-size:11px; color:var(--text-dim);">
          🔥 <span id="g-streak">0</span> dag streak &nbsp;·&nbsp; vandaag <span id="g-today-xp">0</span>/100 XP
        </div>
        <div class="g-xp-bar" style="margin-top:4px;"><div id="g-daily-fill" style="height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:2px;transition:width 0.4s;width:0%"></div></div>
      </div>
      <button id="what-next-btn" onclick="whatNext()">⚡ Wat nu doen?</button>
      <button id="add-btn" onclick="openModal()">+ Taak toevoegen</button>
      <div id="task-total"></div>
    </div>
  </div>

  <div id="main">
    <svg id="chart"></svg>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="t-title" id="t-title"></div>
  <div class="t-row"><span>Prioriteit</span><span id="t-pri"></span></div>
  <div class="t-row"><span>Impact</span><span id="t-impact"></span></div>
  <div class="t-row"><span>Effort</span><span id="t-effort"></span></div>
  <div class="t-row"><span>ROI score</span><span id="t-score"></span></div>
  <div id="t-deadline-row" class="t-row" style="display:none"><span>Deadline</span><span id="t-deadline"></span></div>
  <div><span class="t-cat" id="t-cat"></span></div>
  <div id="t-subtasks-list" style="display:none; margin-top:8px;"></div>
  <div class="t-action" style="display:flex; gap:6px;">
    <button id="t-complete-btn" onclick="confirmComplete()" style="flex:1">✓ Afvinken</button>
    <button id="t-breakdown-btn" onclick="breakItDown()" style="flex:1; background:#7c3aed;">🔀 Break it down</button>
  </div>
</div>

<!-- Add Task Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Nieuwe taak</h2>
    <div class="form-row">
      <label>Taak</label>
      <input type="text" id="f-title" placeholder="Beschrijf de taak...">
    </div>
    <div class="form-row">
      <label>Categorie</label>
      <select id="f-cat">
        <option value="LinkAI">Link AI</option>
        <option value="CHB">CHB</option>
        <option value="TVM">TVM</option>
        <option value="TBF">TBF</option>
        <option value="AFNI">AFNI</option>
        <option value="Syifa">Syifa</option>
        <option value="Persoonlijk">Persoonlijk</option>
      </select>
    </div>
    <div class="form-row">
      <label>Prioriteit (1–5)</label>
      <div class="slider-row">
        <input type="range" id="f-pri" min="1" max="5" value="3" oninput="document.getElementById('v-pri').textContent=this.value">
        <span class="slider-val" id="v-pri">3</span>
      </div>
    </div>
    <div class="form-row">
      <label>Impact (1–5)</label>
      <div class="slider-row">
        <input type="range" id="f-impact" min="1" max="5" value="3" oninput="document.getElementById('v-impact').textContent=this.value">
        <span class="slider-val" id="v-impact">3</span>
      </div>
    </div>
    <div class="form-row">
      <label>Effort (1=makkelijk, 5=zwaar)</label>
      <div class="slider-row">
        <input type="range" id="f-effort" min="1" max="5" value="2" oninput="document.getElementById('v-effort').textContent=this.value">
        <span class="slider-val" id="v-effort">2</span>
      </div>
    </div>
    <div class="form-row">
      <label>Deadline (optioneel)</label>
      <input type="date" id="f-deadline">
    </div>
    <div class="modal-btns">
      <button id="modal-cancel" onclick="closeModal()">Annuleren</button>
      <button id="modal-save" onclick="saveTask()">Toevoegen</button>
    </div>
  </div>
</div>

<div id="zoom-controls">
  <button id="zoom-in">+</button>
  <button id="zoom-reset">⌂</button>
  <button id="zoom-out">−</button>
</div>

<div id="score-legend">
  <div class="dot-sm"></div>

const DAILY_XP_GOAL = 100;

function todayStr() { return new Date().toISOString().slice(0, 10); }

function updateStreak(ptsEarned) {
  const today = todayStr();
  // Reset daily XP if it's a new day
  if (gameState.todayDate !== today) {
    // Check if yesterday's goal was hit (keep streak) or missed (reset)
    if (gameState.todayDate) {
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      if (gameState.todayDate !== yesterday || gameState.todayXP < DAILY_XP_GOAL) {
        gameState.streak = 0;
      }
    }
    gameState.todayXP = 0;
    gameState.todayDate = today;
  }
  gameState.todayXP += ptsEarned;
  // Award streak day when goal is hit for the first time today
  if (gameState.todayXP >= DAILY_XP_GOAL && (gameState.todayXP - ptsEarned) < DAILY_XP_GOAL) {
    gameState.streak += 1;
    gameState.lastStreakDate = today;
    showStreakCelebration(gameState.streak);
  }
}

function showStreakCelebration(streak) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-head);font-size:32px;font-weight:800;color:#f59e0b;text-shadow:0 0 40px rgba(245,158,11,0.9);z-index:999;pointer-events:none;animation:points-fly 2s ease-out forwards;text-align:center;';
  el.innerHTML = `🔥 ${streak} dag streak!<br><span style="font-size:16px">100 XP gehaald!</span>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

function saveGame() { localStorage.setItem('todo-game', JSON.stringify(gameState)); }

function getLevel(xp) {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) return { level: i + 1, ...LEVELS[i] };
  }
  return { level: 1, ...LEVELS[0] };
}

const MAX_TASK_XP = 33;

function taskPoints(task) {
  return Math.min(MAX_TASK_XP, Math.max(5, Math.round((task.priority * task.impact / task.effort) * 10)));
}

function awardPoints(task, x, y) {
  const pts = taskPoints(task);
  gameState.xp += pts;
  gameState.completed += 1;
  updateStreak(pts);
  saveGame();
  updateGameUI();

  // Floating points popup
  const el = document.createElement('div');
  el.className = 'points-popup';
  el.textContent = `+${pts} XP`;
  el.style.left = (x - 30) + 'px';
  el.style.top = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function updateGameUI() {
  const { level, name, min, next } = getLevel(gameState.xp);
  const pct = Math.min(100, ((gameState.xp - min) / (next - min)) * 100);
  document.getElementById('g-level-num').textContent = level;
  document.getElementById('g-level-name').textContent = name;
  document.getElementById('g-xp-fill').style.width = pct + '%';
  document.getElementById('g-xp').textContent = gameState.xp;
  document.getElementById('g-completed').textContent = gameState.completed;

  // Streak + daily progress
  const todayXP = gameState.todayDate === todayStr() ? (gameState.todayXP || 0) : 0;
  const dailyPct = Math.min(100, (todayXP / DAILY_XP_GOAL) * 100);
  document.getElementById('g-streak').textContent = gameState.streak || 0;
  document.getElementById('g-today-xp').textContent = todayXP;
  document.getElementById('g-daily-fill').style.width = dailyPct + '%';
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function scoreTask(t) {
  const base = (t.priority * t.impact) / t.effort;
  let urgencyBoost = 1;
  if (t.deadline) {
    const days = (new Date(t.deadline) - new Date()) / 86400000;
    if (days <= 0) urgencyBoost = 3;
    else if (days <= 2) urgencyBoost = 2.5;
    else if (days <= 7) urgencyBoost = 1.8;
    else if (days <= 14) urgencyBoost = 1.3;
  }
  return base * urgencyBoost;
}

function radiusFromScore(score) {
  return Math.max(28, Math.min(75, 20 + score * 5));
}

// ── URGENCY MAP ───────────────────────────────────────────────────────────────
function autoUrgency(t) {
  const score = scoreTask(t);
  if (t.id === 1) return '🔴⚡ SUPERPRIO'; // CHB FB Ads special
  if (t.priority >= 5) return '🔴 Kritiek';
  if (score >= 12 || t.priority >= 4) return '🟠 Hoog';
  if (score >= 6 || t.priority >= 3) return '🟡 Matig';
  return '🟢 Laag';
}

const URG_ORDER = { '🔴⚡ SUPERPRIO': 5, '🔴 Kritiek': 4, '🟠 Hoog': 3, '🟡 Matig': 2, '🟢 Laag': 1 };

// ── CHART ─────────────────────────────────────────────────────────────────────
let simulation, svg, g, linkG, node, linkSel;
let currentFilter = 'all';
let currentUrgFilter = 'all';
let highlightId = null;
let zoomTransform = d3.zoomIdentity;

const tooltip = document.getElementById('tooltip');

function getFilteredTasks() {
  return tasks.filter(t => {
    const catOk = currentFilter === 'all' || t.category === currentFilter;
    const urgOk = currentUrgFilter === 'all' || autoUrgency(t) === currentUrgFilter;
    return catOk && urgOk;
  });
}

function initChart() {
  svg = d3.select('#chart');

  // Zoom container wrapping everything
  const zoomG = svg.append('g').attr('class', 'zoom-container');

  // Stars background (inside zoom so they move too)
  const starsG = zoomG.append('g').attr('class', 'stars');
  for (let i = 0; i < 200; i++) {
    const w = window.innerWidth * 3, h = window.innerHeight * 3;
    const sz = Math.random() * 1.5;
    starsG.append('circle')
      .attr('cx', Math.random() * w - w/3)
      .attr('cy', Math.random() * h - h/3)
      .attr('r', sz)
      .attr('fill', `rgba(255,255,255,${Math.random() * 0.4 + 0.1})`);
  }

  // Links layer (behind nodes)
  linkG = zoomG.append('g').attr('class', 'links');

  // Nodes layer
  g = zoomG.append('g').attr('class', 'bubbles');

  // Zoom behavior
  const zoom = d3.zoom()
    .scaleExtent([0.1, 5])
    .on('zoom', (event) => {
      zoomTransform = event.transform;
      zoomG.attr('transform', event.transform);
    });

  svg.call(zoom);
  svg.on('dblclick.zoom', null); // disable double-click zoom

  // Zoom buttons
  document.getElementById('zoom-in').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 1.4);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 0.7);
  });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
  });

  simulation = d3.forceSimulation()
    .force('charge', d3.forceManyBody().strength(d => -radiusFromScore(scoreTask(d)) * 2.5))
    .force('collide', d3.forceCollide().radius(d => radiusFromScore(scoreTask(d)) + 8))
    .force('link', d3.forceLink().id(d => d.id).distance(120).strength(0.3))
    .force('x', d3.forceX(window.innerWidth / 2).strength(d => {
      const s = scoreTask(d);
      return 0.03 + s * 0.005;
    }))
    .force('y', d3.forceY(window.innerHeight / 2).strength(d => {
      const s = scoreTask(d);
      return 0.03 + s * 0.005;
    }))
    .alphaDecay(0.018)
    .velocityDecay(0.4);

  renderBubbles();
  updateCounts();
}

function renderBubbles() {
  const data = getFilteredTasks().map(t => {
    const existing = node ? node.data().find(d => d.id === t.id) : null;
    return existing ? { ...t, x: existing.x, y: existing.y, vx: existing.vx, vy: existing.vy } : {
      ...t,
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2 + (Math.random() - 0.5) * 200,
    };
  });

  const allNodes = g.selectAll('.bubble-group').data(data, d => d.id);

  // ENTER
  const enter = allNodes.enter()
    .append('g')
    .attr('class', d => `bubble-group${d.id === highlightId ? ' highlight' : ''}`)
    .style('opacity', 0)
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    )
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', (event, d) => { event.stopPropagation(); pinTooltip(event, d); });

  enter.append('circle')
    .attr('class', 'glow-outer')
    .attr('r', d => radiusFromScore(scoreTask(d)) + 14)
    .attr('fill', d => {
      const score = scoreTask(d);
      const intensity = Math.min(0.45, 0.08 + score * 0.025);
      return CATS[d.category] + Math.round(intensity * 255).toString(16).padStart(2, '0');
    });

  enter.append('circle')
    .attr('class', 'bg')
    .attr('r', d => radiusFromScore(scoreTask(d)))
    .attr('fill', d => {
      const c = CATS[d.category];
      const score = scoreTask(d);
      const id = `grad-${d.id}`;
      const defs = svg.select('defs').empty() ? svg.append('defs') : svg.select('defs');
      const grad = defs.append('radialGradient')
        .attr('id', id)
        .attr('cx', '35%').attr('cy', '35%');
      // High score = vivid, low score = darker/more muted
      const boost = Math.min(60, score * 4);
      grad.append('stop').attr('offset', '0%').attr('stop-color', lighten(c, boost));
      grad.append('stop').attr('offset', '100%').attr('stop-color', score < 4 ? darken(c, 20) : c);
      return `url(#${id})`;
    })
    .attr('opacity', d => {
      const score = scoreTask(d);
      return Math.max(0.4, Math.min(1, 0.4 + score * 0.07));
    });

  // Dashed ring for "what next" highlight
  enter.append('circle')
    .attr('class', 'ring')
    .attr('r', d => radiusFromScore(scoreTask(d)) + 8);

  enter.each(function(d) {
    const r = radiusFromScore(scoreTask(d));
    const label = truncate(d.title, r < 35 ? 10 : r < 50 ? 18 : 28);
    const lines = wrapText(label, r);
    const g = d3.select(this);
    const lineH = 14;
    const totalH = lines.length * lineH;
    lines.forEach((line, i) => {
      g.append('text')
        .attr('dy', -totalH/2 + i * lineH + lineH/2)
        .attr('font-size', r < 35 ? '9px' : r < 50 ? '11px' : '12px')
        .text(line);
    });
  });

  enter.transition().duration(600).ease(d3.easeBackOut).style('opacity', 1);

  // EXIT
  allNodes.exit()
    .transition().duration(400)
    .style('opacity', 0)
    .attr('transform', d => `translate(${d.x},${d.y}) scale(0)`)
    .remove();

  // UPDATE highlight
  g.selectAll('.bubble-group')
    .classed('highlight', d => d.id === highlightId);

  node = g.selectAll('.bubble-group');

  // Build active links for current filtered data
  const activeIds = new Set(data.map(d => d.id));
  const activeLinks = TASK_LINKS
    .filter(([s, t]) => activeIds.has(s) && activeIds.has(t))
    .map(([s, t]) => ({ source: s, target: t }));

  // Render link lines
  linkSel = linkG.selectAll('.link').data(activeLinks);
  linkSel.exit().remove();
  linkSel = linkSel.enter().append('line')
    .attr('class', 'link')
    .attr('stroke', 'rgba(255,255,255,0.35)')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '5 3')
    .merge(linkSel);

  simulation.nodes(data);
  simulation.force('link').links(activeLinks);
  simulation.on('tick', () => {
    node.attr('transform', d => `translate(${d.x},${d.y})`);
    if (linkSel) {
      linkSel
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
    }
  });
  simulation.alpha(0.4).restart();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
let activeTask = null;
let activeEvent = null;

function pinTooltip(event, d) {
  activeTask = d;
  activeEvent = event;
  showTooltip(event, d);
  tooltip.classList.add('pinned');
  // Show existing subtasks if any
  const t = tasks.find(t => t.id === d.id);
  const list = document.getElementById('t-subtasks-list');
  if (t && t.subtasks && t.subtasks.length > 0) {
    renderSubtaskList(t);
  } else {
    list.style.display = 'none';
    list.innerHTML = '';
  }
  document.getElementById('t-breakdown-btn').textContent = '🔀 Break it down';
  document.getElementById('t-breakdown-btn').disabled = false;
}

function confirmComplete() {
  if (!activeTask) return;
  tooltip.classList.remove('pinned', 'visible');
  completeTask(activeEvent, activeTask);
  activeTask = null;
}

async function breakItDown() {
  if (!activeTask) return;
  const btn = document.getElementById('t-breakdown-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Bezig...';

  const task = activeTask;
  try {
    const res = await fetch(
      `https://rica-reaches-independent-duration.trycloudflare.com`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text:
          `Geef 3 tot 5 concrete subtaken voor: "${task.title}" (categorie: ${task.category}).
Antwoord ALLEEN met een JSON array van strings, geen uitleg. Voorbeeld: ["Stap 1","Stap 2","Stap 3"]`
        }] }] })
      }
    );
    const json = await res.json();
    const raw = json.candidates[0].content.parts[0].text.trim();
    const match = raw.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('no array');
    const steps = JSON.parse(match[0]);

    // Store subtasks on the task
    const t = tasks.find(t => t.id === task.id);
    if (t) {
      t.subtasks = steps.map((s, i) => ({ id: `sub-${t.id}-${i}`, title: s, done: false }));
      saveTasks();
      renderSubtaskList(t);
    }
  } catch (e) {
    btn.textContent = '❌ Fout';
  } finally {
    btn.disabled = false;
    if (btn.textContent === '⏳ Bezig...') btn.textContent = '🔀 Break it down';
  }
}

function renderSubtaskList(task) {
  const list = document.getElementById('t-subtasks-list');
  list.style.display = 'block';
  list.innerHTML = (task.subtasks || []).map(sub =>
    `<div class="sub-item${sub.done ? ' done' : ''}" data-sub="${sub.id}">
      <input type="checkbox" ${sub.done ? 'checked' : ''} onchange="toggleSubtask('${task.id}', '${sub.id}', this.checked)">
      <span>${sub.title}</span>
    </div>`
  ).join('');
}

function toggleSubtask(taskId, subId, done) {
  const t = tasks.find(t => String(t.id) === String(taskId));
  if (!t || !t.subtasks) return;
  const sub = t.subtasks.find(s => s.id === subId);
  if (sub) sub.done = done;

  const item = document.querySelector(`.sub-item[data-sub="${subId}"]`);
  if (item) item.classList.toggle('done', done);

  // Auto-complete parent if all subtasks done
  if (t.subtasks.every(s => s.done)) {
    setTimeout(() => {
      tooltip.classList.remove('pinned', 'visible');
      awardPoints(t, window.innerWidth / 2, window.innerHeight / 2);
      tasks = tasks.filter(x => x.id !== t.id);
      saveTasks();
      renderBubbles();
      updateCounts();
      activeTask = null;
    }, 600);
  } else {
    saveTasks();
  }
}

// Close pinned tooltip on background click
document.addEventListener('click', () => {
  if (tooltip.classList.contains('pinned')) {
    tooltip.classList.remove('pinned', 'visible');
    activeTask = null;
  }
});

function completeTask(event, d) {
  hideTooltip();
  awardPoints(d, event.clientX, event.clientY);

  d3.select(this).classed('completing', true);

  setTimeout(() => {
    tasks = tasks.filter(t => t.id !== d.id);
    if (highlightId === d.id) highlightId = null;
    saveTasks();
    renderBubbles();
    updateCounts();
  }, 450);
}

function showTooltip(event, d) {
  const score = scoreTask(d).toFixed(1);
  document.getElementById('t-title').textContent = d.title;
  document.getElementById('t-pri').textContent = '⭐'.repeat(d.priority);
  document.getElementById('t-impact').textContent = '💥'.repeat(d.impact);
  document.getElementById('t-effort').textContent = '⚡'.repeat(d.effort);
  document.getElementById('t-score').textContent = score;
  const cat = document.getElementById('t-cat');
  cat.textContent = d.category;
  cat.style.background = CATS[d.category] + '30';
  cat.style.color = CATS[d.category];

  const dlRow = document.getElementById('t-deadline-row');
  if (d.deadline) {
    dlRow.style.display = 'flex';
    const days = Math.ceil((new Date(d.deadline) - new Date()) / 86400000);
    document.getElementById('t-deadline').textContent =
      days <= 0 ? '🔴 Vandaag!' : days === 1 ? '🟠 Morgen' : `${days} dagen`;
  } else {
    dlRow.style.display = 'none';
  }

  tooltip.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.clientX + 14;
  const y = event.clientY - 10;
  tooltip.style.left = Math.min(x, window.innerWidth - 260) + 'px';
  tooltip.style.top = Math.min(y, window.innerHeight - 200) + 'px';
}

function hideTooltip() {
  if (tooltip.classList.contains('pinned')) return;
  tooltip.classList.remove('visible');
}

function filterCat(btn, cat) {
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = cat;
  currentUrgFilter = 'all';
  document.querySelectorAll('[data-urg]').forEach(b => b.classList.remove('active'));
  renderBubbles();
}

function filterUrg(btn, urg) {
  document.querySelectorAll('[data-urg]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentUrgFilter = urg;
  currentFilter = 'all';
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-cat="all"]').classList.add('active');
  renderBubbles();
}

function whatNext() {
  const visible = getFilteredTasks();
  if (!visible.length) return;
  const best = visible.reduce((a, b) => scoreTask(a) > scoreTask(b) ? a : b);
  highlightId = best.id;
  renderBubbles();

  // show tooltip for best task
  setTimeout(() => {
    const el = g.selectAll('.bubble-group').filter(d => d.id === best.id);
    if (!el.empty()) {
      const d = el.datum();
      tooltip.classList.add('visible');
      document.getElementById('t-title').textContent = '⚡ ' + d.title;
      document.getElementById('t-pri').textContent = '⭐'.repeat(d.priority);
      document.getElementById('t-impact').textContent = '💥'.repeat(d.impact);
      document.getElementById('t-effort').textContent = '⚡'.repeat(d.effort);
      document.getElementById('t-score').textContent = scoreTask(d).toFixed(1);
      const cat = document.getElementById('t-cat');
      cat.textContent = d.category;
      cat.style.background = CATS[d.category] + '30';
      cat.style.color = CATS[d.category];
      document.getElementById('t-deadline-row').style.display = 'none';
      tooltip.style.left = (window.innerWidth / 2 - 60) + 'px';
      tooltip.style.top = '80px';
    }
  }, 300);
}

function updateCounts() {
  const total = tasks.length;
  document.getElementById('count-all').textContent = total;
  document.getElementById('task-total').textContent = `${total} taken open`;
  Object.keys(CATS).forEach(cat => {
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = tasks.filter(t => t.category === cat).length;
  });
  // urgency counts
  const urgMap = {'🔴⚡ SUPERPRIO':'super','🔴 Kritiek':'kritiek','🟠 Hoog':'hoog','🟡 Matig':'matig','🟢 Laag':'laag'};
  Object.entries(urgMap).forEach(([urg, key]) => {
    const el = document.getElementById('count-urg-' + key);
    if (el) el.textContent = tasks.filter(t => autoUrgency(t) === urg).length;
  });
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }

  const task = {
    id: nextId++,
    title,
    category: document.getElementById('f-cat').value,
    priority: +document.getElementById('f-pri').value,
    impact: +document.getElementById('f-impact').value,
    effort: +document.getElementById('f-effort').value,
    deadline: document.getElementById('f-deadline').value || null,
  };

  tasks.push(task);
  saveTasks();
  closeModal();
  document.getElementById('f-title').value = '';
  document.getElementById('f-pri').value = 3; document.getElementById('v-pri').textContent = '3';
  document.getElementById('f-impact').value = 3; document.getElementById('v-impact').textContent = '3';
  document.getElementById('f-effort').value = 2; document.getElementById('v-effort').textContent = '2';
  document.getElementById('f-deadline').value = '';

  renderBubbles();
  updateCounts();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveTask();
});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function lighten(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
}

function darken(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.max(0,r-amount)},${Math.max(0,g-amount)},${Math.max(0,b-amount)})`;
}

function truncate(str, len) {
  return str.length <= len ? str : str.slice(0, len - 1) + '…';
}

function wrapText(text, r) {
  const charsPerLine = Math.floor(r / 3.5);
  if (text.length <= charsPerLine) return [text];
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const w of words) {
    if ((current + ' ' + w).trim().length <= charsPerLine) {
      current = (current + ' ' + w).trim();
    } else {
      if (current) lines.push(current);
      current = w;
    }
  }
  if (current) lines.push(current);
  return lines.slice(0, 3);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateGameUI();

window.addEventListener('resize', () => {
  simulation.force('x', d3.forceX(window.innerWidth / 2).strength(d => 0.04 + scoreTask(d) * 0.006));
  simulation.force('y', d3.forceY(window.innerHeight / 2).strength(d => 0.04 + scoreTask(d) * 0.006));
  simulation.alpha(0.2).restart();
});

initChart();
</script>
